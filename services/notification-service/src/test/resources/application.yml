spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:19999/eureka/
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    root: WARN
    com.aiworkflow: INFO
